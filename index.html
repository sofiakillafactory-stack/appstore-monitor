<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>App Store Monitor</title>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f7;
      padding: 40px 16px;
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
    }

    .card {
      background: #fff;
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 16px;
    }

    .input-row {
      display: flex;
      gap: 8px;
    }

    input {
      flex: 1;
      height: 40px;
      padding: 0 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      background: #0071e3;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0 16px;
      cursor: pointer;
    }

    .notice { margin-top: 10px; font-size: 13px; }
    .error { color: red; }
    .success { color: green; }

    .app-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-top: 1px solid #eee;
    }

    .app-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
    }

    .app-info {
      flex: 1;
    }

    .app-name {
      font-size: 14px;
      font-weight: 500;
    }

    .app-url {
      font-size: 12px;
      color: #888;
    }

    .badge {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 20px;
    }

    .pending { background: #fff3cd; }
    .released { background: #d4edda; }
  </style>
</head>

<body>
<div class="container">

  <h2>App Store Monitor</h2>

  <div class="card">
    <div class="input-row">
      <input id="urlInput" placeholder="ID или ссылка" />
      <button onclick="addApp()">Добавить</button>
    </div>
    <div id="notice" class="notice"></div>
  </div>

  <div class="card">
    <div id="appList"></div>
  </div>

</div>

<script>
const API = 'https://appstore-monitor.onrender.com';

// 🔥 Получаем данные приложения (иконка + название)
async function fetchAppInfo(url) {
  try {
    const id = url.match(/id(\\d+)/)[1];
    const res = await fetch(`https://itunes.apple.com/lookup?id=${id}`);
    const data = await res.json();

    if (data.results.length === 0) return null;

    return {
      name: data.results[0].trackName,
      icon: data.results[0].artworkUrl100
    };
  } catch {
    return null;
  }
}

async function addApp() {
  const input = document.getElementById('urlInput');
  const notice = document.getElementById('notice');
  let url = input.value.trim();

  if (!url) {
    showNotice('Введите ID или ссылку', 'error');
    return;
  }

  if (!/^\\d+$/.test(url) && !url.includes('apps.apple.com')) {
    showNotice('Введите ID или ссылку', 'error');
    return;
  }

  try {
    const res = await fetch(`${API}/add`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url })
    });

    const data = await res.json();

    if (!res.ok) {
      showNotice(data.error, 'error');
    } else {
      showNotice('Добавлено!', 'success');
      input.value = '';
      loadApps();
    }

  } catch {
    showNotice('Сервер не отвечает', 'error');
  }
}

function showNotice(text, type) {
  const el = document.getElementById('notice');
  el.textContent = text;
  el.className = `notice ${type}`;
}

async function loadApps() {
  try {
    const res = await fetch(`${API}/list`);
    const apps = await res.json();

    renderList(apps);
  } catch {}
}

async function renderList(apps) {
  const container = document.getElementById('appList');

  if (!apps.length) {
    container.innerHTML = 'Нет приложений';
    return;
  }

  const items = await Promise.all(apps.map(async app => {
    const info = await fetchAppInfo(app.baseUrl);

    return `
      <div class="app-item">
        <img class="app-icon" src="${info?.icon || ''}" />
        <div class="app-info">
          <div class="app-name">${info?.name || '...'}</div>
          <div class="app-url">${app.baseUrl}</div>
        </div>
        <div class="badge ${app.released ? 'released' : 'pending'}">
          ${app.released ? 'Вышло' : 'Ожидание'}
        </div>
      </div>
    `;
  }));

  container.innerHTML = items.join('');
}

setInterval(loadApps, 5000);
loadApps();
</script>

</body>
</html>
